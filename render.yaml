services:
  - type: web
    name: conductor-luba
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    disk:
      name: conductor-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8080
      - key: TIMEZONE
        value: America/Mexico_City
      - key: CONFIDENCE_THRESHOLD
        value: 0.70
      - key: PENDING_STORE_PATH
        value: data/pending.json
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: TODOIST_ENABLED
        value: true
      - key: TODOIST_SYNC_INTERVAL_SECONDS
        value: 300
      - key: TODOIST_SYNC_ON_START
        value: true
      - key: TODOIST_SYNC_PAUSED
        value: false
      - key: TODOIST_SYNC_MODE
        value: projects
      - key: TODOIST_ALLOW_PROJECT_CREATE
        value: true
      - key: TODOIST_ALLOW_TASK_CREATE
        value: false
      - key: TODOIST_ALLOW_TASK_MOVE
        value: false
      - key: TODOIST_ALLOW_LABEL_WRITE
        value: false
      - key: TODOIST_ALLOW_STATUS_WRITE
        value: false
      - key: TODOIST_ALLOW_MISSING_CANCEL
        value: false
      - key: TODOIST_MAX_TASK_MOVES
        value: 10
      - key: TODOIST_SNAPSHOT_PATH
        value: /var/data/todoist_inventory_snapshot.json
      - key: TODOIST_SYNC_STATE_PATH
        value: /var/data/todoist_sync_state.json
      - key: TODOIST_COMPLETED_SINCE
        value: 2007-01-01
      - key: NOTION_TASKS_DATABASE_ID
        value: be9d26fe652b474696cd5de0118b1210
      - key: NOTION_STUDY_DATABASE_ID
        value: 4e27e10ca2bf44a08b4c8f86c7a125bd
      - key: NOTION_PROJECTS_DATABASE_ID
        value: bbb501a6933941b4837afff250479f0e
      - key: NOTION_STREAMS_DATABASE_ID
        value: cd865f3c143842e8b28843c7d02fc4ae
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: TODOIST_API_TOKEN
        sync: false
      - key: TODOIST_WEBHOOK_SECRET
        sync: false
      - key: TASK_SYNC_SECRET
        sync: false
